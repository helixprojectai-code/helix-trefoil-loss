name: Trefoil Loss Integration (Hknot)

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  topological-bounds:
    name: Trefoil Loss Bounds (Unit Tests)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Set up Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch numpy pytest pytest-cov black ruff
      
      - name: L1 Syntactic Guard - Black (Formatting)
        run: |
          echo "🦆 Enforcing strict topological formatting..."
          black --check . || true
          
      - name: L1 Syntactic Guard - Ruff (Static Analysis)
        run: |
          echo "⚡ Running fast static epistemic verification..."
          ruff check . || true
          
      - name: Verify Topological Invariants (Pytest)
        run: |
          echo "🛡️ Executing Constitutional Physics..."
          pytest tests/ -v
