name: Trefoil Loss Bounds (Unit Tests)

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  hamiltonian-physics:
    name: Trefoil Loss Bounds
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Set up Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install Hamiltonian Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install black ruff pytest
          # Use local editable install so the tests can find 'trefoil_loss' module
          pip install -e .

      - name: L1 Syntactic Guard - Black (Formatting)
        run: |
          echo "🦆 Enforcing strict topological formatting..."
          black --check .

      - name: L1 Syntactic Guard - Ruff (Static Analysis)
        run: |
          echo "⚡ Running fast static epistemic verification..."
          ruff check .
          
      - name: Verify Topological Invariants (Pytest)
        run: |
          echo "🛡️ Executing Constitutional Physics..."
          pytest tests/ -v
